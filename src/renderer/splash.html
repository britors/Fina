<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self';">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      background: #0C1A14 url('assets/splash-fino.jpg') center / cover no-repeat;
      color: #fff;
      width: 700px;
      height: 400px;
      overflow: hidden;
      border-radius: 14px;
      -webkit-app-region: drag;
      user-select: none;
      position: relative;
      animation: zoomIn 6s ease-out both;
    }

    /* Gradient scrim so the wordmark stays legible over the art */
    .scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(12,26,20,0.05) 0%, rgba(12,26,20,0) 30%, rgba(12,26,20,0.55) 72%, rgba(12,26,20,0.92) 100%);
      pointer-events: none;
    }

    /* Brand block, bottom-left over the scrim */
    .brand-block {
      position: absolute;
      left: 40px;
      bottom: 30px;
      z-index: 1;
    }

    .brand {
      font-size: 42px;
      font-weight: 300;
      letter-spacing: -1px;
      color: #fff;
      line-height: 1;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .tagline {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 3px;
      color: #7FE0BC;
      margin-top: 6px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
      animation: fadeUp 0.5s 0.25s ease both;
    }

    /* Progress bar at very bottom */
    .progress-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: #1D2E26;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1D9E75, #2DD4A4);
      animation: load 1.6s 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      width: 0%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes zoomIn {
      from { background-size: 108% auto; }
      to   { background-size: 100% auto; }
    }
    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 72%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="brand-block">
    <div class="brand">fina</div>
    <div class="tagline">FINANÇAS PESSOAIS</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill"></div>
  </div>
</body>
</html>
