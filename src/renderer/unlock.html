<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src 'self';">
  <title>Fina — Desbloquear</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0F1117;
      color: #fff;
      width: 420px;
      height: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      border-radius: 14px;
      border: 0.5px solid #2A2D3A;
      -webkit-app-region: drag;
      user-select: none;
    }
    .icon-wrap { -webkit-app-region: no-drag; }
    .icon-wrap svg { width: 56px; height: 56px; display: block; }
    .title { font-size: 18px; font-weight: 500; }
    .sub { font-size: 12px; color: #9CA3AF; text-align: center; line-height: 1.5; }
    form { width: 100%; display: flex; flex-direction: column; gap: 10px; -webkit-app-region: no-drag; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 0.5px solid #2A2D3A;
      background: #1A1D27;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #1D9E75; }
    button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: none;
      background: #1D9E75;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .error {
      font-size: 12px;
      color: #D85A30;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <circle cx="80" cy="80" r="78" fill="none" stroke="#1D9E75" stroke-width="2" opacity="0.3"/>
      <circle cx="80" cy="80" r="68" fill="#0C2E22"/>
      <path d="M60 76 v-14 a20 20 0 0 1 40 0 v14" fill="none" stroke="#1D9E75" stroke-width="6"/>
      <rect x="52" y="76" width="56" height="42" rx="6" fill="#1D9E75"/>
      <circle cx="80" cy="97" r="6" fill="#0C2E22"/>
    </svg>
  </div>
  <div class="title">Banco de dados protegido</div>
  <div class="sub">Digite a senha mestre para destravar seus dados financeiros.</div>
  <form id="unlock-form">
    <input type="password" id="password" placeholder="Senha mestre" autofocus>
    <button type="submit" id="submit-btn">Desbloquear</button>
    <div class="error" id="error"></div>
  </form>

  <script src="unlock.js"></script>
</body>
</html>
