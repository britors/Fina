<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net data:; script-src 'self';">
  <title>Fina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/tabler-icons.min.css" rel="stylesheet">
  <style>
    /* ── Tokens ─────────────────────────────── */
    :root {
      --bg:       #0F1117;
      --surface:  #1A1D27;
      --surface2: #141720;
      --accent:   #1D9E75;
      --accent-h: #19896A;
      --text:     #FFFFFF;
      --text-2:   #9CA3AF;
      --text-3:   #6B7280;
      --text-4:   #4B5563;
      --danger:   #D85A30;
      --warning:  #EF9F27;
      --border:   #2A2D3A;
      --r-card:   8px;
      --r-panel:  10px;
    }

    /* ── Reset ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }

    /* ── App layout ──────────────────────────── */
    #app { display: flex; height: 100vh; }

    /* ── Sidebar ─────────────────────────────── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .sidebar-header { padding: 14px 24px 12px; }
    .sidebar-logo   { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; display: block; }
    .sidebar-sub    { font-size: 11px; color: var(--text-3); margin-top: 2px; display: block; }
    .sidebar-hr     { height: 0.5px; background: var(--border); margin: 0 16px; }

    .sidebar-nav    { flex: 1; overflow-y: auto; padding: 8px 0; }
    .nav-section    { margin-bottom: 4px; }
    .nav-section-label {
      font-size: 10px;
      color: var(--text-4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 16px 4px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 24px;
      font-size: 13px;
      color: var(--text-3);
      transition: color 0.12s;
      cursor: pointer;
      border-right: 2px solid transparent;
    }
    .nav-item i { font-size: 17px; flex-shrink: 0; }
    .nav-item:hover  { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--text); background: var(--bg); border-right-color: var(--accent); font-weight: 500; }

    .sidebar-user { flex-shrink: 0; }
    .sidebar-user-hr { height: 0.5px; background: var(--border); margin: 0 16px 12px; }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 0 16px 16px; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #085041; color: #9FE1CB;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .user-sub  { font-size: 11px; color: var(--text-3); margin-top: 1px; }

    /* ── Main area ───────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #topbar {
      height: 68px;
      flex-shrink: 0;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .topbar-title    { font-size: 16px; font-weight: 500; color: var(--text); }
    .topbar-subtitle { font-size: 12px; color: var(--text-3); margin-top: 3px; }
    .topbar-actions  { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    #content { flex: 1; overflow-y: auto; padding: 24px; }

    /* ── Buttons ─────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 500; transition: opacity 0.12s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text-2); border: 0.5px solid var(--border); }
    .btn-ghost { background: transparent; color: var(--text-2); border: 0.5px solid var(--border); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 7px; border-radius: 6px; background: var(--surface); border: 0.5px solid var(--border); color: var(--text-2); display: inline-flex; align-items: center; justify-content: center; }
    .btn-icon i { font-size: 16px; }
    .btn-icon:hover { color: var(--text); }

    /* ── Cards ───────────────────────────────── */
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r-panel); }
    .card-body { padding: 20px; }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 0;
      font-size: 13px; font-weight: 500;
    }
    .card-hr { height: 0.5px; background: var(--border); margin: 12px 0 0; }

    .stat-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-card);
      padding: 16px 20px;
    }
    .stat-label { font-size: 11px; color: var(--text-3); margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 600; }
    .stat-sub   { font-size: 11px; color: var(--text-3); margin-top: 4px; }
    .stat-green { color: var(--accent); }
    .stat-red   { color: var(--danger); }

    /* ── Grid layouts ────────────────────────── */
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

    /* ── Table ───────────────────────────────── */
    .table-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r-panel); overflow: hidden; }
    .table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .table th {
      text-align: left; padding: 10px 16px;
      font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-4); background: var(--surface2);
      border-bottom: 0.5px solid var(--border);
    }
    .table td { padding: 11px 16px; border-bottom: 0.5px solid var(--border); }
    .table tr:last-child td { border-bottom: none; }
    .table tbody tr:hover td { background: rgba(255,255,255,0.025); }

    .desc-main { font-weight: 500; color: var(--text); }
    .desc-sub  { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* ── Badges ──────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 10px;
      font-size: 10px; font-weight: 500; white-space: nowrap;
    }
    .badge-income    { background: rgba(29,158,117,.15); color: var(--accent); }
    .badge-expense   { background: rgba(216,90,48,.15);  color: var(--danger); }
    .badge-transfer  { background: rgba(156,163,175,.12); color: var(--text-2); }
    .badge-confirmed { background: rgba(29,158,117,.15); color: var(--accent); }
    .badge-pending   { background: rgba(239,159,39,.15); color: var(--warning); }
    .badge-paid      { background: rgba(29,158,117,.15); color: var(--accent); }
    .badge-overdue   { background: rgba(216,90,48,.15);  color: var(--danger); }
    .badge-ok        { background: rgba(29,158,117,.15); color: var(--accent); }
    .badge-warn      { background: rgba(239,159,39,.15); color: var(--warning); }
    .badge-exceeded  { background: rgba(216,90,48,.15);  color: var(--danger); }

    /* ── Category dot ────────────────────────── */
    .cat-dot {
      width: 28px; height: 28px; border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    /* ── Progress bar ────────────────────────── */
    .prog-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .prog-fill  { height: 100%; border-radius: 4px; transition: width 0.4s; }
    .prog-ok    { background: var(--accent); }
    .prog-warn  { background: var(--warning); }
    .prog-over  { background: var(--danger); }

    /* ── Forms ───────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 5px; }
    .form-ctrl {
      width: 100%; padding: 8px 11px;
      background: var(--bg); border: 0.5px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 13px; font-family: inherit;
      transition: border-color 0.12s;
    }
    .form-ctrl:focus { outline: none; border-color: var(--accent); }
    .form-ctrl option { background: var(--surface); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Filters ─────────────────────────────── */
    .filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .chip {
      padding: 5px 14px; border-radius: 13px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      background: var(--surface); border: 0.5px solid var(--border); color: var(--text-3);
      transition: all 0.12s;
    }
    .chip:hover   { color: var(--text); }
    .chip.active  { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Modal ───────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .modal {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--r-panel); padding: 24px;
      min-width: 460px; max-width: 560px; width: 90%;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .modal-title  { font-size: 16px; font-weight: 600; }
    .modal-close  { background: none; color: var(--text-3); font-size: 18px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ── Alert ───────────────────────────────── */
    .alert { padding: 10px 14px; border-radius: var(--r-card); font-size: 13px; margin-bottom: 14px; }
    .alert-error   { background: rgba(216,90,48,.12);  color: var(--danger); border: 0.5px solid rgba(216,90,48,.3); }
    .alert-success { background: rgba(29,158,117,.12); color: var(--accent); border: 0.5px solid rgba(29,158,117,.3); }

    /* ── Empty state ─────────────────────────── */
    .empty { text-align: center; padding: 56px 24px; color: var(--text-3); }
    .empty i { font-size: 44px; margin-bottom: 12px; display: block; }
    .empty-title { font-size: 15px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }

    /* ── Loading ─────────────────────────────── */
    .loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 48px; color: var(--text-3); }

    /* ── Page header ─────────────────────────── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-title  { font-size: 20px; font-weight: 600; }

    /* ── Budget row ──────────────────────────── */
    .budget-row {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--r-card); padding: 16px 20px; margin-bottom: 10px;
    }
    .budget-row.exceeded { border-color: rgba(216,90,48,.4); }
    .budget-row-header { display: flex; align-items: center; justify-content: space-between; }
    .budget-row-left  { display: flex; align-items: center; gap: 10px; }
    .budget-row-name  { font-weight: 500; font-size: 13px; }
    .budget-row-desc  { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .budget-row-right { text-align: right; font-size: 13px; font-weight: 500; }
    .budget-row-spent { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* ── Account card ────────────────────────── */
    .account-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--r-panel); padding: 24px;
    }
    .account-card-head  { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .account-type-badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 10px; }
    .account-bank   { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
    .account-name   { font-size: 15px; font-weight: 500; margin-bottom: 10px; }
    .account-bal-label { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
    .account-balance { font-size: 26px; font-weight: 600; }
    .account-hr { height: 0.5px; background: var(--border); margin: 14px 0; }
    .account-stats { display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr; gap: 0; }
    .account-stat  { text-align: center; }
    .account-stat-label { font-size: 10px; color: var(--text-3); margin-bottom: 4px; }
    .account-stat-val   { font-size: 12px; font-weight: 500; }
    .account-stat-div   { background: var(--border); }

    /* ── Settings sub-nav ────────────────────── */
    .settings-layout { display: flex; gap: 0; height: 100%; }
    .settings-subnav {
      width: 180px; flex-shrink: 0;
      background: var(--surface2); border-right: 0.5px solid var(--border);
      padding: 8px 0;
    }
    .settings-subnav a {
      display: block; padding: 8px 20px;
      font-size: 13px; color: var(--text-3); cursor: pointer;
      border-right: 2px solid transparent;
    }
    .settings-subnav a:hover  { color: var(--text); }
    .settings-subnav a.active { color: var(--accent); border-right-color: var(--accent); font-weight: 500; }
    .settings-content { flex: 1; padding: 0 28px; overflow-y: auto; }
    .settings-section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-4); margin: 20px 0 4px;
    }
    .settings-hr { height: 0.5px; background: var(--border); margin-bottom: 0; }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 0.5px solid var(--border);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label { font-size: 13px; font-weight: 500; }
    .settings-row-sub   { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .settings-row-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* Toggle */
    .toggle { position: relative; width: 38px; height: 22px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--border); border-radius: 11px; transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; transition: transform 0.2s;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

    /* ── SVG charts ──────────────────────────── */
    .chart-container { display: flex; align-items: center; justify-content: center; }
    .chart-legend { display: flex; flex-direction: column; gap: 10px; padding-left: 20px; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { color: var(--text-2); flex: 1; }
    .legend-val  { font-weight: 500; }

    /* ── Manual document ─────────────────────── */
    .manual-doc {
      max-width: 920px;
      margin: 0 auto;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-panel);
      padding: 34px 42px 44px;
      color: var(--text-2);
      line-height: 1.7;
      font-size: 14px;
    }
    .manual-doc h1 {
      color: var(--text);
      font-size: 28px;
      line-height: 1.2;
      font-weight: 700;
      margin-bottom: 12px;
      padding-bottom: 18px;
      border-bottom: 0.5px solid var(--border);
    }
    .manual-doc h2 {
      color: var(--text);
      font-size: 20px;
      line-height: 1.3;
      font-weight: 650;
      margin: 34px 0 12px;
      padding-top: 8px;
    }
    .manual-doc h3 {
      color: var(--text);
      font-size: 15px;
      line-height: 1.4;
      font-weight: 600;
      margin: 22px 0 8px;
    }
    .manual-doc p { margin: 0 0 12px; }
    .manual-doc ul,
    .manual-doc ol {
      margin: 8px 0 16px 22px;
      padding: 0;
    }
    .manual-doc li { margin: 5px 0; padding-left: 2px; }
    .manual-doc strong { color: var(--text); font-weight: 600; }
    .manual-doc code {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 5px;
      padding: 2px 5px;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
    }

    /* ── Scrollbar ───────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Transitions ─────────────────────────── */
    .page-enter { animation: pageIn 0.18s ease; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Frameless window drag ───────────────── */
    #topbar { -webkit-app-region: drag; }
    #topbar * { -webkit-app-region: no-drag; }

    /* ── Window controls ─────────────────────── */
    .win-controls { display: flex; align-items: center; gap: 2px; margin-left: 8px; }
    .wc-btn {
      width: 34px; height: 28px; border-radius: 6px;
      background: rgba(255,255,255,0.04); color: var(--text-2);
      border: 0.5px solid transparent;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; line-height: 1; letter-spacing: 0;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .wc-btn:hover { background: rgba(255,255,255,0.10); color: var(--text); border-color: var(--border); }
    .wc-btn.wc-close:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* ── Light theme ─────────────────────────── */
    body.theme-light {
      --bg:       #F0F2F5;
      --surface:  #FFFFFF;
      --surface2: #F5F7FA;
      --text:     #111827;
      --text-2:   #374151;
      --text-3:   #6B7280;
      --text-4:   #9CA3AF;
      --border:   #E5E7EB;
    }
    body.theme-light .nav-item:hover  { background: rgba(0,0,0,0.04); }
    body.theme-light .nav-item.active { background: var(--bg); }
    body.theme-light .table tbody tr:hover td { background: rgba(0,0,0,0.025); }
    body.theme-light .overlay { background: rgba(0,0,0,.35); }
    body.theme-light .wc-btn:hover { background: rgba(0,0,0,0.07); color: var(--text); }
    body.theme-light .user-avatar { background: var(--accent); color: #fff; }
    body.theme-light ::-webkit-scrollbar-thumb { background: #CBD5E0; }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar"></aside>
    <div id="main">
      <header id="topbar"></header>
      <main id="content"></main>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
