name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    name: Linux (.deb + .rpm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install RPM tools and icon utils
        run: sudo apt-get install -y rpm inkscape imagemagick

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package (deb + rpm)
        run: npx electron-builder --linux deb rpm --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
          generate_release_notes: true

  release-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Generate icon.ico
        run: |
          choco install inkscape imagemagick --no-progress -y
          inkscape build/icon.svg --export-type=png --export-width=256 --export-filename=build/icon_256.png
          magick build/icon_256.png -define icon:auto-resize=256,128,64,48,32,16 build/icon.ico

      - name: Package (NSIS installer)
        run: npx electron-builder --win nsis --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
