name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    name: Linux (.deb + .rpm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install RPM tools
        run: sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Build app
        run: npm run build

      - name: Package (deb + rpm)
        run: npx electron-builder --linux deb rpm --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
          generate_release_notes: true

  release-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: electron-builder-cache-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Build app
        run: npm run build

      - name: Package (NSIS installer)
        run: npx electron-builder --win nsis --publish never

      - name: Validate updater metadata matches the built installer
        shell: bash
        run: |
          set -euo pipefail
          expected="$(sed -n 's/^path: //p' dist/latest.yml | head -n1 | tr -d '\r')"
          if [ -z "$expected" ]; then
            echo "Erro: não foi possível ler o campo 'path' em dist/latest.yml"
            exit 1
          fi
          if [ ! -f "dist/$expected" ]; then
            echo "Erro: latest.yml aponta para '$expected', mas o arquivo não foi gerado em dist/."
            echo "Artefatos gerados:"
            ls -1 dist
            exit 1
          fi
          echo "OK: latest.yml e o instalador estão alinhados ($expected)."

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
