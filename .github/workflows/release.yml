name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    name: Linux (.deb + .rpm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install RPM tools
        run: sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Build app
        run: npm run build

      - name: Package (deb + rpm)
        run: npx electron-builder --linux deb rpm --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
          generate_release_notes: true

  release-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Build app
        run: npm run build

      - name: Package (NSIS installer)
        run: npx electron-builder --win nsis --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
