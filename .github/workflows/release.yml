name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    name: Linux (.deb + .rpm)
    runs-on: ubuntu-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      npm_config_fetch_retries: 5
      npm_config_fetch_retry_mintimeout: 20000
      npm_config_fetch_retry_maxtimeout: 120000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-linux-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install RPM tools
        run: sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Generate icons
        run: npm run generate-icons

      - name: Build app
        run: npm run build

      - name: Package (deb + rpm)
        run: npx electron-builder --linux deb rpm --publish never

      - name: Copy .rpm to a fixed-name alias
        # O pacote do openSUSE Build Service (home:rodrigosbrito:fina) usa
        # o alias .../releases/latest/download/fina-latest.x86_64.rpm do
        # GitHub como Source0 do fina.spec, pra sempre pegar a release mais
        # nova sem precisar saber o número da versão de antemão. Esse
        # alias só funciona porque o nome do asset é fixo — o .rpm
        # "normal" (fina-<versão>.x86_64.rpm) muda de nome a cada release.
        run: cp dist/fina-*.x86_64.rpm dist/fina-latest.x86_64.rpm

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
          generate_release_notes: true

      - name: Trigger OBS rebuild (home:rodrigosbrito:fina)
        # Dispara o _service (download_files, modo manual) do pacote fina
        # no OBS, que baixa de novo o alias fina-latest.x86_64.rpm (agora
        # apontando pra essa release) e reconstrói. Token criado com
        # `osc token --create --operation runservice home:rodrigosbrito:fina fina`.
        run: |
          curl -f -X POST \
            -H "Authorization: Token ${{ secrets.OBS_TOKEN_FINA }}" \
            "https://api.opensuse.org/trigger/runservice?project=home:rodrigosbrito:fina&package=fina"

  release-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: electron-builder-cache-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Build app
        run: npm run build

      - name: Package (NSIS installer)
        run: npx electron-builder --win nsis --publish never

      - name: Validate updater metadata matches the built installer
        shell: bash
        run: |
          set -euo pipefail
          expected="$(sed -n 's/^path: //p' dist/latest.yml | head -n1 | tr -d '\r')"
          if [ -z "$expected" ]; then
            echo "Erro: não foi possível ler o campo 'path' em dist/latest.yml"
            exit 1
          fi
          if [ ! -f "dist/$expected" ]; then
            echo "Erro: latest.yml aponta para '$expected', mas o arquivo não foi gerado em dist/."
            echo "Artefatos gerados:"
            ls -1 dist
            exit 1
          fi
          echo "OK: latest.yml e o instalador estão alinhados ($expected)."

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
